- playwright: Christopher Marlowe
  play_name: Dido, Queen of Carthage
  character: DIDO
  passage_type: dramatic monologue for a woman
  passage_id: marlowe_012
  line_count: 31
  excerpt: Speaks not Æneas like a conqueror?
  lines:
  - Speaks not Æneas like a conqueror?
  - O blessed tempests that did drive him in!
  - O happy sand that made him run aground!
  - Henceforth you shall be our Carthage gods.
  - Ay, but it may be, he will leave my love,
  - 'And seek a foreign land call''d Italy:'
  - O that I had a charm to keep the winds
  - Within the closure of a golden ball;
  - Or that the Tyrrhene sea were in mine arms,
  - That he might suffer shipwreck on my breast,
  - As oft as he attempts to hoist up sail!
  - I must prevent him; wishing will not serve.--
  - Go bid my nurse take young Ascanius,
  - And bear him in the country to her house;
  - Æneas will not go without his son;
  - Yet, lest he should, for I am full of fear,
  - Bring me his oars, his tackling, and his sails.
  - What if I sink his ships? O, he will frown!
  - Better he frown than I should die of grief.
  - 'I cannot see him frown; it may not be:'
  - Armies of foes resolv'd to win this town,
  - Or impious traitors vow'd to have my life,
  - Affright me not; only Æneas frown
  - 'Is that which terrifies poor Dido''s heart:'
  - Not bloody spears, appearing in the air,
  - Presage the downfall of my empery,
  - Nor blazing comets threaten Dido's death;
  - It is Æneas' frown that ends my days.
  - If he forsake me not, I never die;
  - For in his looks I see eternity,
  - And he'll make me immortal with a kiss.
- playwright: Christopher Marlowe
  play_name: Dido, Queen of Carthage
  character: DIDO
  passage_type: dramatic monologue for a woman
  passage_id: marlowe_013
  line_count: 40
  excerpt: Are these the sails that, in despite of me,
  lines:
  - Are these the sails that, in despite of me,
  - Pack'd with the winds to bear Æneas hence?
  - I'll hang ye in the chamber where I lie;
  - 'Drive, if you can, my house to Italy:'
  - I'll set the casement open, that the winds
  - May enter in, and once again conspire
  - 'Against the life of me, poor Carthage queen:'
  - But, though ye go, he stays in Carthage still;
  - And let rich Carthage fleet upon the sees,
  - So I may have Æneas in mine arms.
  - Is this the wood that grew in Carthage plains,
  - And would be toiling in the watery billows,
  - To rob their mistress of her Trojan guest?
  - O cursed tree, hadst thou but wit or sense,
  - To measure how I prize Æneas' love,
  - Thou wouldst have leapt from out the sailors' hands,
  - And told me that Æneas meant to go!
  - And yet I blame thee not; thou art but wood.
  - The water, which our poets term a nymph,
  - Why did it suffer thee to touch her breast,
  - And shrunk not back, knowing my love was there?
  - The water is an element, no nymph.
  - Why should I blame Æneas for his flight?
  - O Dido, blame him not, but break his oars!
  - These were the instruments that launched him forth.
  - There's not so much as this base tackling too,
  - 'But dares to heap up sorrow to my heart:'
  - Was it not you that hoisted up these sails?
  - Why burst you not, and they fell in the seas?
  - For this will Dido tie ye full of knots.
  - 'And shear ye all asunder with her hands:'
  - Now serve to chastise shipboys for their faults;
  - Ye shall no more offend the Carthage queen.
  - Now, let him hang my favours on his masts,
  - And see if those will serve instead of sails;
  - For tackling, let him take the chains of gold
  - Which I bestow'd upon his followers;
  - Instead of oars, let him us his hands,
  - And swim to Italy. I'll keep these sure.--
  - Come, bear them in.
- playwright: Christopher Marlowe
  play_name: Doctor Faustus
  character: FAUSTUS
  passage_type: dramatic monologue for a man
  passage_id: marlowe_008
  line_count: 62
  excerpt: Ah, Faustus.
  lines:
  - Ah, Faustus.
  - Now hast thou but one bare hour to live,
  - And then thou must be damn'd perpetually!
  - Stand still, you ever-moving spheres of heaven,
  - That time may cease, and midnight never come;
  - Fair Nature's eye, rise, rise again, and make
  - Perpetual day; or let this hour be but
  - A year, a month, a week, a natural day,
  - That Faustus may repent and save his soul!
  - O lente, lente currite, noctis equi!
  - The stars move still, time runs, the clock will strike,
  - The devil will come, and Faustus must be damn'd.
  - O, I'll leap up to my God!--Who pulls me down?--
  - See, see, where Christ's blood streams in the firmament!
  - 'One drop would save my soul, half a drop: ah, my Christ!--'
  - Ah, rend not my heart for naming of my Christ!
  - 'Yet will I call on him: O, spare me, Lucifer!--'
  - 'Where is it now? tis gone: and see, where God'
  - Stretcheth out his arm, and bends his ireful brows!
  - Mountains and hills, come, come, and fall on me,
  - And hide me from the heavy wrath of God!
  - No, no!
  - 'Then will I headlong run into the earth:'
  - Earth, gape! O, no, it will not harbour me!
  - You stars that reign'd at my nativity,
  - Whose influence hath alotted death and hell,
  - Now draw up Faustus, like a foggy mist,
  - Into the entrails of yon labouring clouds,
  - That, when you vomit forth into the air,
  - My limbs may issue from your smoky mouths,
  - So that my soul may but ascend to heaven!
  - '[The clock strikes the half-hour.]'
  - Ah, half the hour is past! 'twill all be past anon.
  - O God,
  - If thou wilt not have mercy on my soul,
  - Yet for Christ's sake, whose blood hath ransom'd me,
  - Impose some end to my incessant pain;
  - Let Faustus live in hell a thousand years,
  - A hundred thousand, and at last be sav'd!
  - O, no end is limited to damned souls!
  - Why wert thou not a creature wanting soul?
  - Or why is this immortal that thou hast?
  - Ah, Pythagoras' metempsychosis, were that true,
  - This soul should fly from me, and I be chang'd
  - Unto some brutish beast! all beasts are happy,
  - For, when they die,
  - Their souls are soon dissolv'd in elements;
  - But mine must live still to be plagu'd in hell.
  - Curs'd be the parents that engender'd me!
  - No, Faustus, curse thyself, curse Lucifer
  - That hath depriv'd thee of the joys of heaven.
  - '[The clock strikes twelve.]'
  - O, it strikes, it strikes! Now, body, turn to air,
  - Or Lucifer will bear thee quick to hell!
  - '[Thunder and lightning.]'
  - O soul, be chang'd into little water-drops,
  - And fall into the ocean, ne'er be found!
  - '[Enter Devils.]'
  - My God, my God, look not so fierce on me!
  - Adders and serpents, let me breathe a while!
  - Ugly hell, gape not! come not, Lucifer!
  - I'll burn my books!
- playwright: Christopher Marlowe
  play_name: Edward II
  character: KING EDWARD
  passage_type: dramatic monologue for a man
  passage_id: marlowe_010
  line_count: 33
  excerpt: Leicester, if gentle words might comfort me,
  lines:
  - Leicester, if gentle words might comfort me,
  - Thy speeches long ago had eas'd my sorrows,
  - For kind and loving hast thou always been.
  - The griefs of private men are soon allay'd;
  - But not of kings. The forest deer, being struck,
  - Runs to an herb that closeth up the wounds;
  - But when the imperial lion's flesh is gor'd,
  - He rends and tears it with his wrathful paw,
  - '[And], highly scorning that the lowly earth'
  - 'Should drink his blood, mounts up to the air:'
  - And so it fares with me, whose dauntless mind
  - Th' ambitious Mortimer would seek to curb,
  - And that unnatural queen, false Isabel,
  - That thus hath pent and mew'd me in a prison
  - For such outrageous passions cloy my soul,
  - As with the wings of rancour and disdain
  - Full often am I soaring up to heaven,
  - To plain me to the gods against them both.
  - But when I call to mind I am a king,
  - Methinks I sould revenge me of my wrongs,
  - That Mortimer and Isabel have done.
  - But what are kings, when regiment is gone,
  - But perfect shadows in a sunshine day?
  - My nobles rule; I bear the name of king;
  - I wear the crown; but am controll'd by them,
  - By Mortimer, and my unconstant queen,
  - Who spots my nuptial bed with infamy;
  - Whilst I am lodg'd within this cave of care,
  - Where sorrow at my elbow still attends,
  - To company my heart with sad laments,
  - That bleeds within me for this strange exchange.
  - But tell me, must I now resign my crown,
  - To make usurping Mortimer a king?
- playwright: Christopher Marlowe
  play_name: The Jew of Malta
  character: BARABAS
  passage_type: comic monologue for a man
  passage_id: marlowe_009
  line_count: 39
  excerpt: '[Discovered in his counting house,'
  lines:
  - '[Discovered in his counting house,'
  - With heaps of gold before him.]
  - So that of thus much that return was made;
  - And of the third part of the Persian ships
  - There was the venture summ'd and satisfied.
  - As for those Samnites, and the men of Uz,
  - That brought my Spanish oils and wines of Greece,
  - Here have I purs'd their paltry silverlings.
  - Fie, what a trouble 'tis to count this trash!
  - Well fare the Arabians, who so richly pay
  - The things they traffic for with wedge of gold,
  - Whereof a man may easily in a day
  - Tell that which may maintain him all his life.
  - The needy groom, that never finger'd groat,
  - Would make a miracle of thus much coin;
  - But he whose steel-barr'd coffers are cramm'd full,
  - And all his life-time hath been tired,
  - Wearying his fingers' ends with telling it,
  - Would in his age he loath to labour so,
  - And for a pound to sweat himself to death.
  - Give me the merchants of the Indian mines,
  - That trade in metal of the purest mould;
  - The wealthy Moor, that in the eastern rocks
  - Without control can pick his riches up,
  - And in his house heap pearl like pebble stones,
  - Receive them free, and sell them by the weight!
  - Bags of fiery opals, sapphires, amethysts,
  - Jacinths, hard topaz, grass-green emeralds,
  - Beauteous rubies, sparkling diamonds,
  - And seld-seen costly stones of so great price,
  - As one of them, indifferently rated,
  - And of a carat of this quantitiy,
  - May serve, in peril of calamity,
  - To ransom great kings from captivity.
  - This is the ware wherein consists my wealth;
  - And thus methinks should men of judgment frame
  - Their means of traffic from the vulgar trade,
  - And, as their wealth increaseth, so inclose
  - Infinite riches in a little room.
- playwright: Christopher Marlowe
  play_name: The Massacre at Paris
  character: DUKE OF GUISE
  passage_type: dramatic monologue for a man
  passage_id: marlowe_011
  line_count: 58
  excerpt: Now, Guise, begin those deep-engender'd thoughts
  lines:
  - Now, Guise, begin those deep-engender'd thoughts
  - To burst abroad those never-dying flames
  - Which cannot be extinguished but by blood.
  - Oft have I levell'd, and at last have learn'd
  - That peril is the chiefest way to happiness,
  - And resolution honour's fairest aim.
  - What glory is there in a common good,
  - That hangs for every peasant to achieve?
  - That like I best, that flies beyond my reach.
  - Set me to scale the high Pyramides,
  - And thereon set the diadem of France;
  - I'll either rend it with my nails to naught,
  - Or mount the top with my aspiring wings,
  - Although my downfall be the deepest hell.
  - For this I wake, when others think I sleep;
  - For this I wait, that scorn attendance else;
  - For this, my quenchless thirst, whereon I build,
  - Hath often pleaded kindred to the king;
  - For this, this head, this heart, this hand, and sword,
  - Contrives, imagines, and fully executes,
  - Matters of import aimed at by many,
  - Yet understood by none;
  - For this, hath heaven engender'd me of earth;
  - For this, this earth sustains my body's weight,
  - And with this weight I'll counterpoise a crown,
  - Or with seditions weary all the world;
  - For this, from Spain the stately Catholics
  - Send Indian gold to coin me French ecues;
  - For this, have I a largess from the Pope,
  - A pension, and a dispensation too;
  - And by that privilege to work upon,
  - My policy hath fram'd religion.
  - Religion! O Diabole!
  - Fie, I am asham'd, however that I seem,
  - To think a word of such a simple sound,
  - Of so great matter should be made the ground!
  - The gentle king, whose pleasure uncontroll'd
  - Weakeneth his body, and will waste his realm,
  - If I repair not what he ruinates,--
  - Him, as a child, I daily win with words,
  - So that for proof he barely bears the name;
  - I execute, and he sustains the blame.
  - The Mother-Queen works wonders for my sake,
  - And in my love entombs the hope of France,
  - Rifling the bowels of her treasury,
  - To supply my wants and necessity.
  - Paris hath full five hundred colleges,
  - As monasteries, priories, abbeys, and halls,
  - Wherein are thirty thousand able men,
  - Besides a thousand sturdy student Catholics;
  - And more,--of my knowledge, in one cloister keep
  - 'Five hundred fat Franciscan friars and priests:'
  - All this, and more, if more may be compris'd,
  - To bring the will of our desires to end.
  - Then, Guise,
  - Since thou hast all the cards within thy hands,
  - To shuffle or cut, take this as surest thing,
  - That, right or wrong, thou deal thyself a king.
- playwright: Christopher Marlowe
  play_name: Richard Duke of Yorke
  character: QUEEN
  passage_type: dramatic monologue for a woman
  passage_id: marlowe_014
  line_count: 39
  excerpt: Brave warriors, Clifford & Northumberland,
  lines:
  - Brave warriors, Clifford & Northumberland,
  - Come make him stand upon this molehill here,
  - That aimed at mountaines with outstretched arm,
  - And parted but the shadow with his hand.
  - Was it you that ruled in our Parliament,
  - And made a preachment of your high descent?
  - Where are your mess of sons to back you now?
  - The wanton Edward, and the lusty George?
  - Or where is that valiant crookback prodigy?
  - Dicky your boy, that with his grumbling voice,
  - Was wont to cheat his dad in mutinies?
  - Or amongst the rest, where is your darling Rutland?
  - Look Yorke? I dipped this napkin in the blood,
  - That valiant Clifford with his rapiers point,
  - Made issue from the bosom of thy boy.
  - And if thine eyes can water for his death,
  - I give thee this to dry thy cheeks withall.
  - Alas poor York. But that I hate thee much,
  - I should lament thy miserable state.
  - I prithee grieve to make me merry, York.
  - Stamp, rave and fret, that I may sing and dance.
  - What? hath thy fiery heart so parched thine entrails,
  - That not a tear can fall for Rutland's death?
  - Thou wouuldst be feed, I see, to make me sport.
  - York cannot speak, unless he wear a crown.
  - A crown for York? and Lords bow low to him.
  - 'So: hold you his hands, while I do set it on.'
  - I, now looks he like a king?
  - This is he that took King Henry's chair,
  - And this is he was his adopted heir.
  - But how is it that great Plantagenet,
  - Is crowned so soon, and broke his holy oath,
  - As I bethink me you should not be king,
  - Till our Henry had shook hands with death
  - And will you impale your head with Henry's glory,
  - And rob his temples of the Diadem
  - Now in his life against your holy oath?
  - Oh, tis a fault too too unpardonable.
  - Off with the crown, and with the crown his head.
- playwright: Christopher Marlowe
  play_name: Richard Duke of Yorke
  character: YORKE
  passage_type: dramatic monologue for a man
  passage_id: marlowe_015
  line_count: 38
  excerpt: 'She wolf of France, but worse than Wolves of France:'
  lines:
  - 'She wolf of France, but worse than Wolves of France:'
  - Whose tongue more poison'd than the Adders tooth
  - How ill beseeming is it in thy sex,
  - To triumph like an Amazonian trull
  - Upon his woes, whom Fortune captivates?
  - But that thy face is visard like, unchanging,
  - 'Made impudent by use of evil deeds:'
  - 'I would assay, proud Queen to make thee blush:'
  - To tell thee of whence thou art, from whom derived,
  - Twere shame enough to shame thee, wert thou not shameless.
  - Thy father bears the type of king of Naples,
  - Of both the Sicily's and Jerusalem,
  - Yet not so wealthy as an English Yeoman.
  - Hath that poor Monarch taught thee to insult?
  - It needs not, or it boots thee not proud Queen,
  - 'Unlesse the Adage must be verified:'
  - That beggars mounted, run their horse to death.
  - Tis beauty, that oft makes women proud,
  - But God he wots thy share thereof is small.
  - Tis Government, that makes them most admired,
  - The contrary doth make thee wondered at.
  - Tis virtue that makes them seem devine,
  - The want thereof makes thee abominable.
  - Thou art as opposite to every good,
  - As the Antipodes are untu us,
  - Or as the south to the Septentrion.
  - Oh Tiger's heart wrapped in a woman's hide?
  - How couldst thou drain the life blood of the child,
  - To bid the father wipe his eyes withall,
  - And yet be seen to bear a woman's face?
  - Women are mild, pitiful, and flexible,
  - Thou indurate, stern, rough, remorseless.
  - Bids thou me rage? why now thou hast thy will.
  - Wouldst have me weep? why so thou hast thy wish.
  - For raging winds blow up a storm of tears,
  - And when the rage allays the rain begins.
  - These tears are my sweet Rutland's obsequies,
  - And every drop begs vengeance as it falls.
- playwright: Christopher Marlowe
  play_name: Richard Duke of Yorke
  character: GLOSTER
  passage_type: dramatic monologue for a man
  passage_id: marlowe_016
  line_count: 30
  excerpt: I, Edward, will use women honourably,
  lines:
  - I, Edward, will use women honourably,
  - Would he were wasted marrow, bones and all,
  - That from his loins no issue might succeed
  - To hinder me from the golden time I look for,
  - For I am not yet looked on in the world.
  - First is there Edward, Clarence, and Henry
  - And his son, and all thy looked for issue
  - Of their loins ere I can plant my self,
  - A cold premeditation for my purpose,
  - What other pleasure is there in the world beside?
  - I will go clad my body in gay ornaments,
  - And lull my self within a lady's lap,
  - And witch sweet Ladies with my words and looks.
  - Oh monstrous man, to harbour such a thought!
  - Why love did scorn me in my mother's womb,
  - And for I should not deal in her affairs,
  - She did corrupt frail nature in the flesh,
  - And plaste an envious mountain on my back,
  - Where sits deformity to mock my body,
  - To dry mine arm up like a withered shrimp.
  - To make my legs of an unequal size,
  - And am I then a man to be belov'd?
  - Easier for me to compass twenty crowns.
  - Tut I can smile, and murder when I smile,
  - I cry content, to that that grieves me most.
  - I can add colours to the chameleon,
  - And for a need change shapes with Protheus,
  - And set the aspiring Catalin to school.
  - Can I do this, and cannot get the crown?
  - Tush were it ten times higher, I'll pull it down.
- playwright: Christopher Marlowe
  play_name: Tamburlaine the Great
  character: TAMBURLAINE
  passage_type: dramatic monologue for a man
  passage_id: marlowe_001
  line_count: 44
  excerpt: In thee, thou valiant man of Persia,
  lines:
  - In thee, thou valiant man of Persia,
  - I see the folly of thy emperor.
  - Art thou but captain of a thousand horse,
  - That, by characters graven in thy brows
  - And by thy martial face and stout aspect,
  - Deserv'st to have the leading of an host?
  - Forsake thy king, and do but join with me,
  - And we will triumph over all the world.
  - I hold the Fates bound fast in iron chains,
  - And with my hand turn Fortune's wheel about;
  - And sooner shall the sun fall from his sphere
  - Than Tamburlaine be slain or overcome.
  - Draw forth thy sword, thou mighty man-at-arms,
  - Intending but to race my charméd skin,
  - And Jove himself will stretch his hand from heaven
  - To ward the blow and shield me safe from harm.
  - See how he rains down heaps of gold in showers,
  - As if he meant to give me soldiers pay!
  - And, as a sure and grounded argument
  - That I shall be the monarch of the East,
  - He sends this soldan's daughter, rich and brave,
  - To be my queen and portly emperess.
  - If thou wilt stay with me, renownéd man,
  - And lead thy thousand horse with my conduct,
  - Besides thy share of this Egyptian prize,
  - Those thousand horse shall sweat with martial spoil
  - Of conquered kingdoms and of cities sacked.
  - Both we will walk upon the lofty clifts;
  - And Christian merchants that with Russian stems
  - Plow up huge furrows in the Caspian sea
  - Shall vail to us as lords of all the lake.
  - Both we will reign as consuls of the earth,
  - And mighty kings shall be our senators.
  - Jove sometime maskéd in a shepherd's weed;
  - And by those steps that he hath scaled the heavens
  - May we become immortal like the gods!
  - Join with me now in this my mean estate
  - (I call it mean because, being yet obscure,
  - The nations far removed admire me not),
  - And, when my name and honor shall be spread
  - As far as Boreas claps his brazen wings,
  - Or fair Boötes sends his cheerful light,
  - Then shalt thou be competitor with me,
  - And sit with Tamburlaine in all his majesty.
- playwright: Christopher Marlowe
  play_name: Tamburlaine the Great
  character: TAMBURLAINE
  passage_type: dramatic monologue for a man
  passage_id: marlowe_002
  line_count: 26
  excerpt: Now clear the triple region of the air,
  lines:
  - Now clear the triple region of the air,
  - And let the Majesty of Heaven behold
  - Their scourge and terror tread on emperors.
  - Smile, stars that reign'd at my nativity,
  - And dim the brightness of your neighbour lamps,
  - Disdain to borrow light of Cynthia!
  - For I, chiefest lamp of all the earth,
  - First rising in the east with mild aspect,
  - But fixed now in the meridian line,
  - Will send up fire to your turning spheres,
  - And cause the sun to borrow light of you.
  - My sword struck fire from his coat of steel,
  - Even in Bithynia, when I took his Turk;
  - As when a fiery exhalation,
  - Wrapt in the bowels, of a freezing cloud,
  - Fighting for passage, make[s] the welkin crack,
  - 'And casts a flash of lightning to the earth:'
  - But, ere I march to wealthy Persia,
  - Or leave Damascus and th' Egyptian fields,
  - As was the fame of Cylmene's brain-sick son
  - That almost brent the axle-tree of heaven,
  - So shall our swords, our lances, and our shot
  - Fill all the air with fiery meteors;
  - Then, when the sky shall wax as red as blood,
  - It shall be said I made it red myself,
  - To make me think of naught but blood and war.
- playwright: Christopher Marlowe
  play_name: Tamburlaine the Great
  character: FIRST VIRGIN
  passage_type: dramatic monologue for a woman
  passage_id: marlowe_003
  line_count: 32
  excerpt: Most happy king and emperor of the earth,
  lines:
  - Most happy king and emperor of the earth,
  - Image of honour and nobility,
  - For whom the powers divine have made the world,
  - And on whose throne the holy Graces sit;
  - In whose sweet person is compris'd the sum
  - Of Nature's skill and heavenly majesty;
  - Pity our plights! O, pity poor Damascus!
  - Pity old age, within whose silver hairs
  - Honour and reverence evermore have reign'd!
  - Pity the marriage-bed, where many a lord,
  - In prime and glory of his loving joy,
  - Embraceth now with tears of ruth and blood
  - The jealous body of his fearful wife,
  - Whose cheeks and hearts, so punish'd with conceit,
  - To think thy puissant never-stayed arm
  - Will part their bodies, and prevent their souls
  - From heavens of comfort yet their age might bear,
  - Now wax all pale and wither'd to the death,
  - As well for grief our ruthless governor
  - Hath thus refus'd the mercy of thy hand,
  - (Whose sceptre angels kiss and Furies dread,)
  - As for their liberties, their loves, or lives!
  - O, then, for these, and such as we ourselves,
  - For us, for infants, and for all our bloods,
  - That never nourish'd thought against thy rule,
  - Pity, O pity, sacred emperor,
  - 'The prostrate service of this wretched town:'
  - And take in sign thereof this gilded wreath,
  - Whereto each man of ruth hath given his hand,
  - And wish'd, as worthy subjects, happy means
  - To be investors of thy royal brows
  - Even with the true Egyptian diadem!
- playwright: Christopher Marlowe
  play_name: Tamburlaine the Great
  character: TAMBURLAINE
  passage_type: dramatic monologue for a man
  passage_id: marlowe_004
  line_count: 56
  excerpt: Ah, fair Zenocrate!--divine Zenocrate!
  lines:
  - Ah, fair Zenocrate!--divine Zenocrate!
  - Fair is too foul an epithet for thee,--
  - That in thy passion for thy country's love,
  - And fear to see thy kingly father's harm,
  - With hair dishevell'd wip'st thy watery cheeks;
  - And, like to Flora in her morning's pride,
  - Shaking her silver tresses in the air,
  - Rain'st on the earth resolved pearl in showers,
  - And sprinklest sapphires on thy shining face,
  - Where Beauty, mother to the Muses, sits,
  - And comments volumes with her ivory pen,
  - Taking instructions from thy flowing eyes;
  - Eyes, when that Ebena steps to heaven,
  - In silence of thy solemn evening's walk,
  - Making the mantle of the richest night,
  - The moon, the planets, and the meteors, light;
  - There angels in their crystal armours fight
  - A doubtful battle with my tempted thoughts
  - For Egypt's freedom and the Soldan's life,
  - His life that so consumes Zenocrate;
  - Whose sorrows lay more siege unto my soul
  - Than all my army to Damascus' walls;
  - And neither Persia's sovereign nor the Turk
  - Troubled my senses with conceit of foil
  - So much by much as doth Zenocrate.
  - What is beauty, saith my sufferings, then?
  - If all the pens that ever poets held
  - Had fed the feeling of their masters' thoughts,
  - And every sweetness that inspir'd their hearts,
  - Their minds, and muses on admired themes;
  - If all the heavenly quintessence they still
  - From their immortal flowers of poesy,
  - Wherein, as in a mirror, we perceive
  - The highest reaches of a human wit;
  - If these had made one poem's period,
  - And all combin'd in beauty's worthiness,
  - Yet should their hover in their restless heads
  - One thought, one grace, one wonder, at the least,
  - Which into words no virtue can digest.
  - But how unseemly is it for my sex,
  - My discipline of arms and chivalry,
  - My nature, and the terror of my name,
  - To harbour thoughts effeminate and faint!
  - Save only that in beauty's just applause,
  - With whose instinct the soul of man is touched;
  - And every warrior that is rapt with love
  - Of fame, of valour, and of victory,
  - 'Must needs have beauty beat on his conceits:'
  - I thus conceiving, and subduing both,
  - That which hath stoop'd the chiefest of the gods,
  - Even from the fiery-spangled veil of heaven,
  - To feel the lovely warmth of shepherds' flames,
  - And mask in cottages of strowed reeds,
  - Shall give the world to note, for all my birth,
  - That virtue solely is the sum of glory,
  - And fashions men with true nobility.
- playwright: Christopher Marlowe
  play_name: Tamburlaine the Great, Part Two
  character: TAMBURLAINE
  passage_type: dramatic monologue for a man
