    source: "standard probability textbook"
  - label: "Covariance definition (expectation form)"
    latex: "\\operatorname{Cov}(X,Y) = E[(X-\\mu_X)(Y-\\mu_Y)]"
    source: "Casella & Berger, Statistical Inference"
  - label: "Covariance of sums of two pairs of variables"
    latex: "\\operatorname{Cov}(X_1+X_2, Y) = \\operatorname{Cov}(X_1,Y) + \\operatorname{Cov}(X_2,Y)"
    source: "Ross, A First Course in Probability"
  - label: "Covariance of independent random variables"
    latex: "\\operatorname{Cov}(X,Y) = 0"
    source: "Ross, A First Course in Probability"
  - label: "Slope of simple linear regression via covariance"
    latex: "\\beta_1 = \\frac{\\operatorname{Cov}(X,Y)}{\\operatorname{Var}(X)}"
    source: "Kutner, Applied Linear Statistical Models"
  - label: "Autocovariance function of a stationary process"
    latex: "\\gamma(h) = \\operatorname{Cov}(X_t, X_{t+h})"
    source: "Box & Jenkins, Time Series Analysis"
  - label: "Variance decomposition (law of total variance)"
    latex: "\\operatorname{Var}(Y) = E[\\operatorname{Var}(Y \\mid X)] + \\operatorname{Var}(E[Y \\mid X])"
    source: "Casella & Berger, Statistical Inference"
  - label: "Covariance of sample means of two independent samples"
    latex: "\\operatorname{Cov}(\\bar{X}, \\bar{Y}) = \\frac{\\operatorname{Cov}(X,Y)}{n}"
    source: "Casella & Berger, Statistical Inference"
  - label: "Bernoulli pmf"
    latex: "P(X=x) = p^x (1-p)^{1-x}"
    source: "Casella & Berger, Statistical Inference"
  - label: "Bernoulli variance"
    latex: "\\operatorname{Var}(X) = p(1-p)"
    source: "Casella & Berger, Statistical Inference"
  - label: "Binomial pmf"
    latex: "P(X=k) = \\binom{n}{k} p^k (1-p)^{n-k}"
    source: "Casella & Berger, Statistical Inference"
  - label: "Binomial pmf normalization"
    latex: "\\sum_{k=0}^{n} \\binom{n}{k} p^k (1-p)^{n-k} = 1"
    source: "Casella & Berger, Statistical Inference"
  - label: "Poisson pmf"
    latex: "P(X=k) = \\frac{\\lambda^k e^{-\\lambda}}{k!}"
    source: "Casella & Berger, Statistical Inference"
  - label: "Geometric pmf (trials to first success)"
    latex: "P(X=k) = (1-p)^{k-1} p"
    source: "Ross, A First Course in Probability"
  - label: "Geometric pmf (failures before success)"
    latex: "P(X=k) = (1-p)^k p"
    source: "Ross, A First Course in Probability"
  - label: "Negative binomial pmf (successes count)"
    latex: "P(X=k) = \\binom{k-1}{r-1} p^r (1-p)^{k-r}"
    source: "Ross, A First Course in Probability"
  - label: "Negative binomial pmf (failures count)"
    latex: "P(X=k) = \\binom{k+r-1}{k} p^r (1-p)^k"
    source: "Ross, A First Course in Probability"
  - label: "Hypergeometric pmf"
    latex: "P(X=k) = \\frac{\\binom{K}{k}\\binom{N-K}{n-k}}{\\binom{N}{n}}"
    source: "Casella & Berger, Statistical Inference"
  - label: "Efficiency ratio of two estimators"
    latex: "e(\\hat{\\theta}_1, \\hat{\\theta}_2) = \\frac{\\operatorname{Var}(\\hat{\\theta}_2)}{\\operatorname{Var}(\\hat{\\theta}_1)}"
    source: "standard statistics texts"
  - label: "Variance of three independent variables sum"
    latex: "\\operatorname{Var}(X + Y + Z) = \\operatorname{Var}(X) + \\operatorname{Var}(Y) + \\operatorname{Var}(Z)"
    source: "Casella & Berger, Statistical Inference"
  - label: "Covariance of sum with third variable"
    latex: "\\operatorname{Cov}(X+Y, Z) = \\operatorname{Cov}(X,Z) + \\operatorname{Cov}(Y,Z)"
    source: "Casella & Berger, Statistical Inference"
  - label: "Expectation of a constant"
    latex: "E[c] = c"
    source: "Ross, A First Course in Probability"
  - label: "Variance of a constant"
    latex: "\\operatorname{Var}(c) = 0"
    source: "Ross, A First Course in Probability"
  - label: "Chebyshev's inequality"
    latex: "P(|X - \\mu| \\geq k\\sigma) \\leq \\frac{1}{k^2}"
    source: "Ross, A First Course in Probability"
  - label: "Markov's inequality"
    latex: "P(X \\geq a) \\leq \\frac{E[X]}{a}"
    source: "Ross, A First Course in Probability"
  - label: "Moment generating function derivative relation"
    latex: "E[X] = \\frac{d}{dt} M_X(t) \\Big|_{t=0}"
    source: "Casella & Berger, Statistical Inference"
  - label: "Margin of error for a confidence interval on the mean"
    latex: "E = z^{*} \\frac{\\sigma}{\\sqrt{n}}"
    source: "standard intro statistics textbooks"
  - label: "Confidence interval half-width using t critical value"
    latex: "E = t^{*} \\frac{s}{\\sqrt{n}}"
    source: "standard intro statistics textbooks"
  - label: "Joint probability from marginal and conditional"
    latex: "P(X=x, Y=y) = P(Y=y \\mid X=x) P(X=x)"
    source: "Casella & Berger, Statistical Inference"

  # --- LLM-recovered (sympy-unverifiable; pools in llm_pools.json, 1-error) ---
  - label: "Conditional expectation via law of total expectation"
    latex: "E[X] = E[X \\mid Y=1] P(Y=1) + E[X \\mid Y=0] P(Y=0)"
    source: "Ross, A First Course in Probability"
  - label: "Sensitivity (true positive rate)"
    latex: "\\text{Sens} = \\frac{P(T^+ \\cap D^+)}{P(D^+)}"
    source: "Gelman et al., Bayesian Data Analysis"
  - label: "Lognormal variance"
    latex: "\\operatorname{Var}(X) = \\left(e^{\\sigma^2} - 1\\right) e^{2\\mu + \\sigma^2}"
    source: "standard probability textbook"
  - label: "Correlation coefficient"
    latex: "\\rho_{X,Y} = \\frac{\\operatorname{Cov}(X,Y)}{\\sigma_X \\sigma_Y}"
    source: "standard probability textbook"
  - label: "Covariance of variable with itself"
    latex: "\\operatorname{Cov}(X,X) = \\operatorname{Var}(X)"
    source: "Ross, A First Course in Probability"
  - label: "Covariance with additive constants"
    latex: "\\operatorname{Cov}(X+a, Y+b) = \\operatorname{Cov}(X,Y)"
    source: "Ross, A First Course in Probability"
  - label: "Correlation as covariance of standardized variables"
    latex: "\\rho_{X,Y} = E\\left[\\frac{(X-\\mu_X)}{\\sigma_X} \\cdot \\frac{(Y-\\mu_Y)}{\\sigma_Y}\\right]"
    source: "Wackerly, Mathematical Statistics with Applications"
  - label: "Coefficient of determination from correlation"
    latex: "R^2 = \\rho_{X,Y}^2"
    source: "Wackerly, Mathematical Statistics with Applications"
  - label: "Correlation bound inequality equated at extremum"
    latex: "\\rho_{X,Y}^2 = 1 - \\frac{\\operatorname{Var}(Y - \\beta_1 X)}{\\operatorname{Var}(Y)}"
    source: "Kutner, Applied Linear Statistical Models"
  - label: "Standard deviation of a linear transformation"
    latex: "\\sigma_{aX+b} = |a| \\sigma_X"
    source: "Casella & Berger, Statistical Inference"
  - label: "Poisson pmf consecutive ratio"
    latex: "\\frac{P(X=k)}{P(X=k-1)} = \\frac{\\lambda}{k}"
    source: "Ross, A First Course in Probability"
  - label: "Binomial pmf consecutive ratio"
    latex: "\\frac{P(X=k)}{P(X=k-1)} = \\frac{n-k+1}{k}\\frac{p}{1-p}"
    source: "Ross, A First Course in Probability"
  - label: "Mean squared error decomposition"
    latex: "MSE(\\hat{\\theta}) = \\operatorname{Var}(\\hat{\\theta}) + (\\operatorname{Bias}(\\hat{\\theta}))^2"
    source: "Casella & Berger, Statistical Inference"
  - label: "Bias of an estimator"
    latex: "\\operatorname{Bias}(\\hat{\\theta}) = E[\\hat{\\theta}] - \\theta"
    source: "Casella & Berger, Statistical Inference"
  - label: "Cramer-Rao lower bound"
    latex: "\\operatorname{Var}(\\hat{\\theta}) = \\frac{1}{n I(\\theta)}"
    source: "Cramer-Rao inequality, standard texts"
  - label: "Fisher information (single observation)"
    latex: "I(\\theta) = E\\left[\\left(\\frac{d}{d\\theta} \\log f(X;\\theta)\\right)^2\\right]"
    source: "Casella & Berger, Statistical Inference"
  - label: "Standard error via delta method"
    latex: "SE(g(\\hat{\\theta})) = |g'(\\theta)| SE(\\hat{\\theta})"
    source: "delta method, standard texts"
  - label: "OLS slope estimator"
    latex: "\\hat{\\beta}_1 = \\frac{\\sum_{i=1}^{n} (X_i - \\bar{X})(Y_i - \\bar{Y})}{\\sum_{i=1}^{n} (X_i - \\bar{X})^2}"
    source: "standard regression texts"
  - label: "Method of moments estimator (mean)"
    latex: "\\hat{\\mu} = \\frac{1}{n} \\sum_{i=1}^{n} X_i"
    source: "method of moments, standard texts"
  - label: "Maximum likelihood estimator of normal variance"
    latex: "\\hat{\\sigma}^2 = \\frac{1}{n} \\sum_{i=1}^{n} (X_i - \\bar{X})^2"
    source: "standard MLE texts"
  - label: "Standard error of Poisson rate estimator"
    latex: "SE(\\hat{\\lambda}) = \\sqrt{\\frac{\\hat{\\lambda}}{n}}"
    source: "standard statistics texts"
  - label: "Bootstrap standard error estimator"
    latex: "SE_{boot} = \\sqrt{\\frac{1}{B-1} \\sum_{b=1}^{B} (\\hat{\\theta}_b^* - \\bar{\\theta}^*)^2}"
    source: "Efron & Tibshirani, An Introduction to the Bootstrap"
  - label: "Jackknife variance estimator"
    latex: "\\operatorname{Var}_{jack}(\\hat{\\theta}) = \\frac{n-1}{n} \\sum_{i=1}^{n} (\\hat{\\theta}_{(i)} - \\bar{\\theta}_{(\\cdot)})^2"
    source: "Tukey's jackknife, standard texts"
  - label: "Standard error of log-transformed estimator"
    latex: "SE(\\log \\hat{\\theta}) = \\frac{SE(\\hat{\\theta})}{\\hat{\\theta}}"
    source: "delta method application, standard texts"
  - label: "Covariance symmetry"
    latex: "\\operatorname{Cov}(X,Y) = \\operatorname{Cov}(Y,X)"
    source: "Casella & Berger, Statistical Inference"
  - label: "Cauchy-Schwarz bound on covariance"
    latex: "|\\operatorname{Cov}(X,Y)| \\leq \\sigma_X \\sigma_Y"
    source: "Casella & Berger, Statistical Inference"
  - label: "Chi-square goodness-of-fit test statistic"
    latex: "\\chi^2 = \\sum \\frac{(O_i - E_i)^2}{E_i}"
    source: "Pearson's chi-square test"
  - label: "t-statistic for a regression slope coefficient"
    latex: "t = \\frac{\\hat{\\beta}_1 - \\beta_0}{SE(\\hat{\\beta}_1)}"
    source: "standard regression textbooks"
  - label: "Sample size for estimating a mean within margin of error"
    latex: "n = \\left(\\frac{z^{*} \\sigma}{E}\\right)^2"
    source: "standard intro statistics textbooks"
  - label: "Yates continuity-corrected chi-square statistic"
    latex: "\\chi^2 = \\sum \\frac{(|O_i - E_i| - 0.5)^2}{E_i}"
    source: "Yates (1934)"
  - label: "F-statistic as ratio of two scaled chi-square variables"
    latex: "F = \\frac{\\chi_1^2 / df_1}{\\chi_2^2 / df_2}"
    source: "definition of F-distribution"
  - label: "Fitted regression line"
    latex: "\\hat{y}_i = \\hat{\\beta}_0 + \\hat{\\beta}_1 x_i"
    source: "Montgomery, Introduction to Linear Regression Analysis"
  - label: "OLS slope estimator"
    latex: "\\hat{\\beta}_1 = \\frac{\\sum_{i=1}^{n} (x_i - \\bar{x})(y_i - \\bar{y})}{\\sum_{i=1}^{n} (x_i - \\bar{x})^2}"
    source: "Montgomery, Introduction to Linear Regression Analysis"
  - label: "OLS intercept estimator"
    latex: "\\hat{\\beta}_0 = \\bar{y} - \\hat{\\beta}_1 \\bar{x}"
    source: "Montgomery, Introduction to Linear Regression Analysis"
  - label: "Slope in terms of correlation and standard deviations"
    latex: "\\hat{\\beta}_1 = r_{xy} \\frac{s_y}{s_x}"
    source: "Kutner, Applied Linear Statistical Models"
  - label: "Residual standard error"
    latex: "\\hat{\\sigma}^2 = \\frac{SSE}{n-2}"
    source: "Kutner, Applied Linear Statistical Models"
  - label: "t-statistic for slope"
    latex: "t = \\frac{\\hat{\\beta}_1 - \\beta_1}{SE(\\hat{\\beta}_1)}"
    source: "Kutner, Applied Linear Statistical Models"
  - label: "Least squares normal equation for intercept"
    latex: "\\sum_{i=1}^{n} y_i = n \\hat{\\beta}_0 + \\hat{\\beta}_1 \\sum_{i=1}^{n} x_i"
    source: "Montgomery, Introduction to Linear Regression Analysis"
  - label: "Least squares normal equation for slope"
    latex: "\\sum_{i=1}^{n} x_i y_i = \\hat{\\beta}_0 \\sum_{i=1}^{n} x_i + \\hat{\\beta}_1 \\sum_{i=1}^{n} x_i^2"
    source: "Montgomery, Introduction to Linear Regression Analysis"
  - label: "Slope via corrected sums"
    latex: "\\hat{\\beta}_1 = \\frac{S_{xy}}{S_{xx}}"
    source: "Montgomery, Introduction to Linear Regression Analysis"
  - label: "Variance of the slope estimator"
    latex: "\\operatorname{Var}(\\hat{\\beta}_1) = \\frac{\\sigma^2}{S_{xx}}"
    source: "Montgomery, Introduction to Linear Regression Analysis"
  - label: "Variance of the intercept estimator"
    latex: "\\operatorname{Var}(\\hat{\\beta}_0) = \\sigma^2 \\left( \\frac{1}{n} + \\frac{\\bar{x}^2}{S_{xx}} \\right)"
    source: "Montgomery, Introduction to Linear Regression Analysis"
  - label: "Covariance of slope and intercept estimators"
    latex: "\\operatorname{Cov}(\\hat{\\beta}_0, \\hat{\\beta}_1) = - \\frac{\\sigma^2 \\bar{x}}{S_{xx}}"
    source: "Montgomery, Introduction to Linear Regression Analysis"
  - label: "Standardized residual"
    latex: "r_i = \\frac{e_i}{\\hat{\\sigma} \\sqrt{1 - h_{ii}}}"
    source: "Kutner, Applied Linear Statistical Models"
