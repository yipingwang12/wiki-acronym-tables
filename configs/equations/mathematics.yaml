  - label: "Linear approximation (differential)"
    latex: "dy = f'(x) \\, dx"
    source: "Stewart, Calculus"
  - label: "Implicit differentiation of circle"
    latex: "2x + 2y \\frac{dy}{dx} = 0"
    source: "Stewart, Calculus"
  - label: "Related rates chain form"
    latex: "\\frac{dV}{dt} = 3 r^2 \\frac{dr}{dt}"
    source: "Stewart, Calculus"
  - label: "Mean value theorem"
    latex: "f'(c) = \\frac{f(b) - f(a)}{b - a}"
    source: "Stewart, Calculus"
  - label: "Fundamental theorem of calculus (evaluation)"
    latex: "\\int_{a}^{b} f'(x)\\,dx = f(b) - f(a)"
    source: "Stewart, Calculus"
  - label: "Power rule integral"
    latex: "\\int_{0}^{1} x^{n}\\,dx = \\frac{1}{n+1}"
    source: "Stewart, Calculus"
  - label: "Integration by parts (definite)"
    latex: "\\int_{a}^{b} u\\,dv = u(b)v(b) - u(a)v(a) - \\int_{a}^{b} v\\,du"
    source: "Stewart, Calculus"
  - label: "Integral of sin over one period"
    latex: "\\int_{0}^{2\\pi} \\sin x\\,dx = 0"
    source: "Stewart, Calculus"
  - label: "Integral of cos over half period"
    latex: "\\int_{0}^{\\pi} \\cos x\\,dx = 0"
    source: "Stewart, Calculus"
  - label: "Integral of sin^2 over one period"
    latex: "\\int_{0}^{2\\pi} \\sin^{2} x\\,dx = \\pi"
    source: "Stewart, Calculus"
  - label: "Integral of cos^2 over one period"
    latex: "\\int_{0}^{2\\pi} \\cos^{2} x\\,dx = \\pi"
    source: "Stewart, Calculus"
  - label: "Integral of 1/x on [1,e]"
    latex: "\\int_{1}^{e} \\frac{1}{x}\\,dx = 1"
    source: "Stewart, Calculus"
  - label: "Integral of e^x on [0,1]"
    latex: "\\int_{0}^{1} e^{x}\\,dx = e - 1"
