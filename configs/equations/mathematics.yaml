  - label: "Derivative of square root"
    latex: "\\frac{d}{dx} \\sqrt{x} = \\frac{1}{2\\sqrt{x}}"
    source: "Stewart, Calculus"
  - label: "nth derivative of x^n"
    latex: "\\frac{d^n}{dx^n} x^n = n!"
    source: "Stewart, Calculus"
  - label: "General power rule (chain form)"
    latex: "\\frac{d}{dx}\\left[f(x)\\right]^n = n \\left[f(x)\\right]^{n-1} f'(x)"
