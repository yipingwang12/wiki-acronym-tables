  - label: "Wallis' formula for sin^{2n+1}"
    latex: "\\int_{0}^{\\pi/2} \\sin^{2n+1} x\\,dx = \\frac{4^{n} (n!)^{2}}{(2n+1)!}"
    source: "Gradshteyn & Ryzhik, Tables of Integrals"
