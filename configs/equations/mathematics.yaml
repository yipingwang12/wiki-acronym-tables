  - label: "Gaussian integral over symmetric domain (finite normalization identity)"
    latex: "\\int_{-1}^{1} \\frac{3}{2} x^{2}\\,dx = 1"
    source: "Stewart, Calculus"
  - label: "Area under semicircle"
    latex: "\\int_{-1}^{1} \\sqrt{1 - x^{2}}\\,dx = \\frac{\\pi}{2}"
    source: "Stewart, Calculus"
  - label: "Area under quarter circle radius r"
    latex: "\\int_{0}^{r} \\sqrt{r^{2} - x^{2}}\\,dx = \\frac{\\pi r^{2}}{4}"
