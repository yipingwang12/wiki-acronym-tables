  - label: "Logarithmic differentiation of exponential-power"
    latex: "\\frac{d}{dx} f(x)^{g(x)} = f(x)^{g(x)} \\left(g'(x) \\ln f(x) + \\frac{g(x) f'(x)}{f(x)}\\right)"
