  - label: "Derivative of hyperbolic sine"
    latex: "\\frac{d}{dx} \\sinh x = \\cosh x"
    source: "Stewart, Calculus"
  - label: "Derivative of hyperbolic cosine"
    latex: "\\frac{d}{dx} \\cosh x = \\sinh x"
    source: "Stewart, Calculus"
  - label: "Derivative of hyperbolic tangent"
    latex: "\\frac{d}{dx} \\tanh x = 1 - \\tanh^2 x"
