  - label: "Sum of cosines (Dirichlet-type)"
    latex: "\\sum_{k=0}^{n} \\cos(k\\theta) = \\frac{\\sin\\left(\\frac{(n+1)\\theta}{2}\\right)\\cos\\left(\\frac{n\\theta}{2}\\right)}{\\sin\\left(\\frac{\\theta}{2}\\right)}"
    source: "Gradshteyn & Ryzhik, Table of Integrals, Series, and Products"
  - label: "Sum of sines (Dirichlet-type)"
    latex: "\\sum_{k=0}^{n} \\sin(k\\theta) = \\frac{\\sin\\left(\\frac{(n+1)\\theta}{2}\\right)\\sin\\left(\\frac{n\\theta}{2}\\right)}{\\sin\\left(\\frac{\\theta}{2}\\right)}"
    source: "Gradshteyn & Ryzhik, Table of Integrals, Series, and Products"
  - label: "Sum of logarithms as factorial"
    latex: "\\sum_{k=1}^{n} \\log k = \\log(n!)"
