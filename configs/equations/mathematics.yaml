  - label: "Average value of a function"
    latex: "f_{avg} = \\frac{1}{b-a} \\int_{a}^{b} f(x)\\,dx"
    source: "Stewart, Calculus"
  - label: "Mean value theorem for integrals"
    latex: "\\int_{a}^{b} f(x)\\,dx = f(c)(b-a)"
    source: "Stewart, Calculus"
  - label: "Wallis' formula for sin^{2n}"
    latex: "\\int_{0}^{\\pi/2} \\sin^{2n} x\\,dx = \\frac{\\pi}{2} \\cdot \\frac{(2n)!}{4^{n} (n!)^{2}}"
