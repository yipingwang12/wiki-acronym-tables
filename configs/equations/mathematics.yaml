# Mathematics — Core Identities → error-spot deck (quiz mode `error-spot`).
# LLM-drafted, machine-verified (sympy corruption proof) + correctness-audited (2026-07-23);
# existing curated equations kept first for FSRS item_key continuity.

deck_name: "Mathematics — Core Identities"
group: "Equations"

corruption:
  pool_size: 12
  types: [sign_flip, exponent_off_by_one, constant_perturb, variable_swap]

equations:
