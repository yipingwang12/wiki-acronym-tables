    latex: "a_+ \\psi_n = \\sqrt{n+1} \\, \\psi_{n+1}"
    source: "Griffiths, Introduction to Quantum Mechanics"
  - label: "Ladder operator lowering"
    latex: "a_- \\psi_n = \\sqrt{n} \\, \\psi_{n-1}"
    source: "Griffiths, Introduction to Quantum Mechanics"
  - label: "Angular momentum operator commutator"
    latex: "[L_x, L_y] = i \\hbar L_z"
    source: "Griffiths, Introduction to Quantum Mechanics"
  - label: "Position-momentum commutator"
    latex: "[x, p] = i \\hbar"
    source: "Griffiths, Introduction to Quantum Mechanics"
  - label: "Expectation value of position"
    latex: "\\langle x \\rangle = \\int_a^b x |\\psi(x)|^2 \\, dx"
    source: "Griffiths, Introduction to Quantum Mechanics"
  - label: "Normalization condition"
    latex: "\\int_a^b |\\psi(x)|^2 \\, dx = 1"
    source: "Griffiths, Introduction to Quantum Mechanics"
  - label: "WKB quantization condition"
    latex: "\\int_a^b p(x) \\, dx = \\left(n + \\frac{1}{2}\\right) \\pi \\hbar"
    source: "Griffiths, Introduction to Quantum Mechanics"
  - label: "Pauli matrix commutator"
    latex: "[\\sigma_x, \\sigma_y] = 2 i \\sigma_z"
    source: "Griffiths, Introduction to Quantum Mechanics"
