collection_title: "Shakespeare's Sonnets"
gutenberg_id: 1041
poems:
  - poem_title: "Sonnet 1"
    start_marker: "From fairest creatures we desire increase,"
    end_marker: "To eat the world’s due, by the grave and thee."
  - poem_title: "Sonnet 2"
    start_marker: "When forty winters shall besiege thy brow,"
    end_marker: "And see thy blood warm when thou feel’st it cold."
  - poem_title: "Sonnet 3"
    start_marker: "Look in thy glass and tell the face thou viewest"
    end_marker: "Die single and thine image dies with thee."
  - poem_title: "Sonnet 4"
    start_marker: "Unthrifty loveliness, why dost thou spend"
    end_marker: "Which, used, lives th’ executor to be."
  - poem_title: "Sonnet 5"
    start_marker: "Those hours, that with gentle work did frame"
    end_marker: "Leese but their show; their substance still lives sweet."
  - poem_title: "Sonnet 6"
    start_marker: "Then let not winter’s ragged hand deface,"
    end_marker: "To be death’s conquest and make worms thine heir."
  - poem_title: "Sonnet 7"
    start_marker: "Lo! in the orient when the gracious light"
    end_marker: "Unlook’d, on diest unless thou get a son."
  - poem_title: "Sonnet 8"
    start_marker: "Music to hear, why hear’st thou music sadly?"
    end_marker: "Sings this to thee: ‘Thou single wilt prove none.’"
  - poem_title: "Sonnet 9"
    start_marker: "Is it for fear to wet a widow’s eye,"
    end_marker: "That on himself such murd’rous shame commits."
  - poem_title: "Sonnet 10"
    start_marker: "For shame! deny that thou bear’st love to any,"
    end_marker: "That beauty still may live in thine or thee."
  - poem_title: "Sonnet 11"
    start_marker: "As fast as thou shalt wane, so fast thou grow’st,"
    end_marker: "Thou shouldst print more, not let that copy die."
  - poem_title: "Sonnet 12"
    start_marker: "When I do count the clock that tells the time,"
    end_marker: "Save breed, to brave him when he takes thee hence."
  - poem_title: "Sonnet 13"
    start_marker: "O! that you were your self; but, love you are"
    end_marker: "You had a father: let your son say so."
  - poem_title: "Sonnet 14"
    start_marker: "Not from the stars do I my judgement pluck;"
    end_marker: "‘Thy end is truth’s and beauty’s doom and date.’"
  - poem_title: "Sonnet 15"
    start_marker: "When I consider everything that grows"
    end_marker: "As he takes from you, I engraft you new."
  - poem_title: "Sonnet 16"
    start_marker: "But wherefore do not you a mightier way"
    end_marker: "And you must live, drawn by your own sweet skill."
  - poem_title: "Sonnet 17"
    start_marker: "Who will believe my verse in time to come,"
    end_marker: "You should live twice,—in it, and in my rhyme."
  - poem_title: "Sonnet 18"
    start_marker: "Shall I compare thee to a summer’s day?"
    end_marker: "So long lives this, and this gives life to thee."
  - poem_title: "Sonnet 19"
    start_marker: "Devouring Time, blunt thou the lion’s paws,"
    end_marker: "My love shall in my verse ever live young."
  - poem_title: "Sonnet 20"
    start_marker: "A woman’s face with nature’s own hand painted,"
    end_marker: "Mine be thy love and thy love’s use their treasure."
  - poem_title: "Sonnet 21"
    start_marker: "So is it not with me as with that Muse,"
    end_marker: "I will not praise that purpose not to sell."
  - poem_title: "Sonnet 22"
    start_marker: "My glass shall not persuade me I am old,"
    end_marker: "Thou gav’st me thine not to give back again."
  - poem_title: "Sonnet 23"
    start_marker: "As an unperfect actor on the stage,"
    end_marker: "To hear with eyes belongs to love’s fine wit."
  - poem_title: "Sonnet 24"
    start_marker: "Mine eye hath play’d the painter and hath stell’d,"
    end_marker: "They draw but what they see, know not the heart."
  - poem_title: "Sonnet 25"
    start_marker: "Let those who are in favour with their stars"
    end_marker: "Where I may not remove nor be remov’d."
  - poem_title: "Sonnet 26"
    start_marker: "Lord of my love, to whom in vassalage"
    end_marker: "Till then, not show my head where thou mayst prove me."
  - poem_title: "Sonnet 27"
    start_marker: "Weary with toil, I haste me to my bed,"
    end_marker: "For thee, and for myself, no quiet find."
  - poem_title: "Sonnet 28"
    start_marker: "How can I then return in happy plight,"
    end_marker: "And night doth nightly make grief’s length seem stronger."
  - poem_title: "Sonnet 29"
    start_marker: "When in disgrace with fortune and men’s eyes"
    end_marker: "That then I scorn to change my state with kings."
  - poem_title: "Sonnet 30"
    start_marker: "When to the sessions of sweet silent thought"
    end_marker: "All losses are restor’d and sorrows end."
  - poem_title: "Sonnet 31"
    start_marker: "Thy bosom is endeared with all hearts,"
    end_marker: "And thou, all they, hast all the all of me."
  - poem_title: "Sonnet 32"
    start_marker: "If thou survive my well-contented day,"
    end_marker: "Theirs for their style I’ll read, his for his love’."
  - poem_title: "Sonnet 33"
    start_marker: "Full many a glorious morning have I seen"
    end_marker: "Suns of the world may stain when heaven’s sun staineth."
  - poem_title: "Sonnet 34"
    start_marker: "Why didst thou promise such a beauteous day,"
    end_marker: "And they are rich and ransom all ill deeds."
  - poem_title: "Sonnet 35"
    start_marker: "No more be griev’d at that which thou hast done:"
    end_marker: "To that sweet thief which sourly robs from me."
  - poem_title: "Sonnet 36"
    start_marker: "Let me confess that we two must be twain,"
    end_marker: "As thou being mine, mine is thy good report."
  - poem_title: "Sonnet 37"
    start_marker: "As a decrepit father takes delight"
    end_marker: "This wish I have; then ten times happy me!"
  - poem_title: "Sonnet 38"
    start_marker: "How can my Muse want subject to invent,"
    end_marker: "The pain be mine, but thine shall be the praise."
  - poem_title: "Sonnet 39"
    start_marker: "O! how thy worth with manners may I sing,"
    end_marker: "By praising him here who doth hence remain."
  - poem_title: "Sonnet 40"
    start_marker: "Take all my loves, my love, yea take them all;"
    end_marker: "Kill me with spites yet we must not be foes."
  - poem_title: "Sonnet 41"
    start_marker: "Those pretty wrongs that liberty commits,"
    end_marker: "Thine by thy beauty being false to me."
  - poem_title: "Sonnet 42"
    start_marker: "That thou hast her it is not all my grief,"
    end_marker: "Sweet flattery! then she loves but me alone."
  - poem_title: "Sonnet 43"
    start_marker: "When most I wink, then do mine eyes best see,"
    end_marker: "And nights bright days when dreams do show thee me."
  - poem_title: "Sonnet 44"
    start_marker: "If the dull substance of my flesh were thought,"
    end_marker: "But heavy tears, badges of either’s woe."
  - poem_title: "Sonnet 45"
    start_marker: "The other two, slight air, and purging fire"
    end_marker: "I send them back again, and straight grow sad."
  - poem_title: "Sonnet 46"
    start_marker: "Mine eye and heart are at a mortal war,"
    end_marker: "And my heart’s right, thy inward love of heart."
  - poem_title: "Sonnet 47"
    start_marker: "Betwixt mine eye and heart a league is took,"
    end_marker: "Awakes my heart, to heart’s and eye’s delight."
  - poem_title: "Sonnet 48"
    start_marker: "How careful was I when I took my way,"
    end_marker: "For truth proves thievish for a prize so dear."
  - poem_title: "Sonnet 49"
    start_marker: "Against that time, if ever that time come,"
    end_marker: "Since why to love I can allege no cause."
  - poem_title: "Sonnet 50"
    start_marker: "How heavy do I journey on the way,"
    end_marker: "My grief lies onward, and my joy behind."
  - poem_title: "Sonnet 51"
    start_marker: "Thus can my love excuse the slow offence"
    end_marker: "Towards thee I’ll run, and give him leave to go.’"
  - poem_title: "Sonnet 52"
    start_marker: "So am I as the rich, whose blessed key,"
    end_marker: "Being had, to triumph; being lacked, to hope."
  - poem_title: "Sonnet 53"
    start_marker: "What is your substance, whereof are you made,"
    end_marker: "But you like none, none you, for constant heart."
  - poem_title: "Sonnet 54"
    start_marker: "O! how much more doth beauty beauteous seem"
    end_marker: "When that shall vade, by verse distills your truth."
  - poem_title: "Sonnet 55"
    start_marker: "Not marble, nor the gilded monuments"
    end_marker: "You live in this, and dwell in lovers’ eyes."
  - poem_title: "Sonnet 56"
    start_marker: "Sweet love, renew thy force; be it not said"
    end_marker: "Makes summer’s welcome, thrice more wished, more rare."
  - poem_title: "Sonnet 57"
    start_marker: "Being your slave what should I do but tend,"
    end_marker: "Though you do anything, he thinks no ill."
  - poem_title: "Sonnet 58"
    start_marker: "That god forbid, that made me first your slave,"
    end_marker: "Not blame your pleasure be it ill or well."
  - poem_title: "Sonnet 59"
    start_marker: "If there be nothing new, but that which is"
    end_marker: "To subjects worse have given admiring praise."
  - poem_title: "Sonnet 60"
    start_marker: "Like as the waves make towards the pebbled shore,"
    end_marker: "Praising thy worth, despite his cruel hand."
  - poem_title: "Sonnet 61"
    start_marker: "Is it thy will, thy image should keep open"
    end_marker: "From me far off, with others all too near."
  - poem_title: "Sonnet 62"
    start_marker: "Sin of self-love possesseth all mine eye"
    end_marker: "Painting my age with beauty of thy days."
  - poem_title: "Sonnet 63"
    start_marker: "Against my love shall be as I am now,"
    end_marker: "And they shall live, and he in them still green."
  - poem_title: "Sonnet 64"
    start_marker: "When I have seen by Time’s fell hand defac’d"
    end_marker: "But weep to have, that which it fears to lose."
  - poem_title: "Sonnet 65"
    start_marker: "Since brass, nor stone, nor earth, nor boundless sea,"
    end_marker: "That in black ink my love may still shine bright."
  - poem_title: "Sonnet 66"
    start_marker: "Tired with all these, for restful death I cry:"
    end_marker: "Save that, to die, I leave my love alone."
  - poem_title: "Sonnet 67"
    start_marker: "Ah! wherefore with infection should he live,"
    end_marker: "In days long since, before these last so bad."
  - poem_title: "Sonnet 68"
    start_marker: "Thus is his cheek the map of days outworn,"
    end_marker: "To show false Art what beauty was of yore."
  - poem_title: "Sonnet 69"
    start_marker: "Those parts of thee that the world’s eye doth view"
    end_marker: "The soil is this, that thou dost common grow."
  - poem_title: "Sonnet 70"
    start_marker: "That thou art blam’d shall not be thy defect,"
    end_marker: "Then thou alone kingdoms of hearts shouldst owe."
  - poem_title: "Sonnet 71"
    start_marker: "No longer mourn for me when I am dead"
    end_marker: "And mock you with me after I am gone."
  - poem_title: "Sonnet 72"
    start_marker: "O! lest the world should task you to recite"
    end_marker: "And so should you, to love things nothing worth."
  - poem_title: "Sonnet 73"
    start_marker: "That time of year thou mayst in me behold"
    end_marker: "To love that well, which thou must leave ere long."
  - poem_title: "Sonnet 74"
    start_marker: "But be contented: when that fell arrest"
    end_marker: "And that is this, and this with thee remains."
  - poem_title: "Sonnet 75"
    start_marker: "So are you to my thoughts as food to life,"
    end_marker: "Or gluttoning on all, or all away."
  - poem_title: "Sonnet 76"
    start_marker: "Why is my verse so barren of new pride,"
    end_marker: "So is my love still telling what is told."
  - poem_title: "Sonnet 77"
    start_marker: "Thy glass will show thee how thy beauties wear,"
    end_marker: "Shall profit thee and much enrich thy book."
  - poem_title: "Sonnet 78"
    start_marker: "So oft have I invoked thee for my Muse,"
    end_marker: "As high as learning, my rude ignorance."
  - poem_title: "Sonnet 79"
    start_marker: "Whilst I alone did call upon thy aid,"
    end_marker: "Since what he owes thee, thou thyself dost pay."
  - poem_title: "Sonnet 80"
    start_marker: "O how I faint when I of you do write,"
    end_marker: "The worst was this: my love was my decay."
  - poem_title: "Sonnet 81"
    start_marker: "Or I shall live your epitaph to make,"
    end_marker: "Where breath most breathes, even in the mouths of men."
  - poem_title: "Sonnet 82"
    start_marker: "I grant thou wert not married to my Muse,"
    end_marker: "Where cheeks need blood; in thee it is abus’d."
  - poem_title: "Sonnet 83"
    start_marker: "I never saw that you did painting need,"
    end_marker: "Than both your poets can in praise devise."
  - poem_title: "Sonnet 84"
    start_marker: "Who is it that says most, which can say more,"
    end_marker: "Being fond on praise, which makes your praises worse."
  - poem_title: "Sonnet 85"
    start_marker: "My tongue-tied Muse in manners holds her still,"
    end_marker: "Me for my dumb thoughts, speaking in effect."
  - poem_title: "Sonnet 86"
    start_marker: "Was it the proud full sail of his great verse,"
    end_marker: "Then lacked I matter; that enfeebled mine."
  - poem_title: "Sonnet 87"
    start_marker: "Farewell! thou art too dear for my possessing,"
    end_marker: "In sleep a king, but waking no such matter."
  - poem_title: "Sonnet 88"
    start_marker: "When thou shalt be dispos’d to set me light,"
    end_marker: "That for thy right, myself will bear all wrong."
  - poem_title: "Sonnet 89"
    start_marker: "Say that thou didst forsake me for some fault,"
    end_marker: "For I must ne’er love him whom thou dost hate."
  - poem_title: "Sonnet 90"
    start_marker: "Then hate me when thou wilt; if ever, now;"
    end_marker: "Compar’d with loss of thee, will not seem so."
  - poem_title: "Sonnet 91"
    start_marker: "Some glory in their birth, some in their skill,"
    end_marker: "All this away, and me most wretched make."
  - poem_title: "Sonnet 92"
    start_marker: "But do thy worst to steal thyself away,"
    end_marker: "Thou mayst be false, and yet I know it not."
  - poem_title: "Sonnet 93"
    start_marker: "So shall I live, supposing thou art true,"
    end_marker: "If thy sweet virtue answer not thy show!"
  - poem_title: "Sonnet 94"
    start_marker: "They that have power to hurt, and will do none,"
    end_marker: "Lilies that fester, smell far worse than weeds."
  - poem_title: "Sonnet 95"
    start_marker: "How sweet and lovely dost thou make the shame"
    end_marker: "The hardest knife ill-us’d doth lose his edge."
  - poem_title: "Sonnet 96"
    start_marker: "Some say thy fault is youth, some wantonness;"
    end_marker: "As, thou being mine, mine is thy good report."
  - poem_title: "Sonnet 97"
    start_marker: "How like a winter hath my absence been"
    end_marker: "That leaves look pale, dreading the winter’s near."
  - poem_title: "Sonnet 98"
    start_marker: "From you have I been absent in the spring,"
    end_marker: "As with your shadow I with these did play."
  - poem_title: "Sonnet 99"
    start_marker: "The forward violet thus did I chide:"
    end_marker: "But sweet, or colour it had stol’n from thee."
  - poem_title: "Sonnet 100"
    start_marker: "Where art thou Muse that thou forget’st so long,"
    end_marker: "So thou prevent’st his scythe and crooked knife."
  - poem_title: "Sonnet 101"
    start_marker: "O truant Muse what shall be thy amends"
    end_marker: "To make him seem long hence as he shows now."
  - poem_title: "Sonnet 102"
    start_marker: "My love is strengthen’d, though more weak in seeming;"
    end_marker: "Because I would not dull you with my song."
  - poem_title: "Sonnet 103"
    start_marker: "Alack! what poverty my Muse brings forth,"
    end_marker: "Your own glass shows you when you look in it."
  - poem_title: "Sonnet 104"
    start_marker: "To me, fair friend, you never can be old,"
    end_marker: "Ere you were born was beauty’s summer dead."
  - poem_title: "Sonnet 105"
    start_marker: "Let not my love be call’d idolatry,"
    end_marker: "Which three till now, never kept seat in one."
  - poem_title: "Sonnet 106"
    start_marker: "When in the chronicle of wasted time"
    end_marker: "Have eyes to wonder, but lack tongues to praise."
  - poem_title: "Sonnet 107"
    start_marker: "Not mine own fears, nor the prophetic soul"
    end_marker: "When tyrants’ crests and tombs of brass are spent."
  - poem_title: "Sonnet 108"
    start_marker: "What’s in the brain, that ink may character,"
    end_marker: "Where time and outward form would show it dead."
  - poem_title: "Sonnet 109"
    start_marker: "O! never say that I was false of heart,"
    end_marker: "Save thou, my rose, in it thou art my all."
  - poem_title: "Sonnet 110"
    start_marker: "Alas! ’tis true, I have gone here and there,"
    end_marker: "Even to thy pure and most most loving breast."
  - poem_title: "Sonnet 111"
    start_marker: "O! for my sake do you with Fortune chide,"
    end_marker: "Even that your pity is enough to cure me."
  - poem_title: "Sonnet 112"
    start_marker: "Your love and pity doth the impression fill,"
    end_marker: "That all the world besides methinks are dead."
  - poem_title: "Sonnet 113"
    start_marker: "Since I left you, mine eye is in my mind;"
    end_marker: "My most true mind thus maketh mine untrue."
  - poem_title: "Sonnet 114"
    start_marker: "Or whether doth my mind, being crown’d with you,"
    end_marker: "That mine eye loves it and doth first begin."
  - poem_title: "Sonnet 115"
    start_marker: "Those lines that I before have writ do lie,"
    end_marker: "To give full growth to that which still doth grow?"
  - poem_title: "Sonnet 116"
    start_marker: "Let me not to the marriage of true minds"
    end_marker: "I never writ, nor no man ever lov’d."
  - poem_title: "Sonnet 117"
    start_marker: "Accuse me thus: that I have scanted all,"
    end_marker: "The constancy and virtue of your love."
  - poem_title: "Sonnet 118"
    start_marker: "Like as, to make our appetite more keen,"
    end_marker: "Drugs poison him that so fell sick of you."
  - poem_title: "Sonnet 119"
    start_marker: "What potions have I drunk of Siren tears,"
    end_marker: "And gain by ill thrice more than I have spent."
  - poem_title: "Sonnet 120"
    start_marker: "That you were once unkind befriends me now,"
    end_marker: "Mine ransoms yours, and yours must ransom me."
  - poem_title: "Sonnet 121"
    start_marker: "’Tis better to be vile than vile esteem’d,"
    end_marker: "All men are bad and in their badness reign."
  - poem_title: "Sonnet 122"
    start_marker: "Thy gift, thy tables, are within my brain"
    end_marker: "Were to import forgetfulness in me."
  - poem_title: "Sonnet 123"
    start_marker: "No, Time, thou shalt not boast that I do change:"
    end_marker: "I will be true despite thy scythe and thee."
  - poem_title: "Sonnet 124"
    start_marker: "If my dear love were but the child of state,"
    end_marker: "Which die for goodness, who have lived for crime."
  - poem_title: "Sonnet 125"
    start_marker: "Were’t aught to me I bore the canopy,"
    end_marker: "When most impeach’d, stands least in thy control."
  - poem_title: "Sonnet 126"
    start_marker: "O thou, my lovely boy, who in thy power"
    end_marker: "And her quietus is to render thee."
  - poem_title: "Sonnet 127"
    start_marker: "In the old age black was not counted fair,"
    end_marker: "That every tongue says beauty should look so."
  - poem_title: "Sonnet 128"
    start_marker: "How oft when thou, my music, music play’st,"
    end_marker: "Give them thy fingers, me thy lips to kiss."
  - poem_title: "Sonnet 129"
    start_marker: "The expense of spirit in a waste of shame"
    end_marker: "To shun the heaven that leads men to this hell."
  - poem_title: "Sonnet 130"
    start_marker: "My mistress’ eyes are nothing like the sun;"
    end_marker: "As any she belied with false compare."
  - poem_title: "Sonnet 131"
    start_marker: "Thou art as tyrannous, so as thou art,"
    end_marker: "And thence this slander, as I think, proceeds."
  - poem_title: "Sonnet 132"
    start_marker: "Thine eyes I love, and they, as pitying me,"
    end_marker: "And all they foul that thy complexion lack."
  - poem_title: "Sonnet 133"
    start_marker: "Beshrew that heart that makes my heart to groan"
    end_marker: "Perforce am thine, and all that is in me."
  - poem_title: "Sonnet 134"
    start_marker: "So, now I have confess’d that he is thine,"
    end_marker: "He pays the whole, and yet am I not free."
  - poem_title: "Sonnet 135"
    start_marker: "Whoever hath her wish, thou hast thy ‘Will,’"
    end_marker: "Think all but one, and me in that one ‘Will.’"
  - poem_title: "Sonnet 136"
    start_marker: "If thy soul check thee that I come so near,"
    end_marker: "And then thou lov’st me for my name is ‘Will.’"
  - poem_title: "Sonnet 137"
    start_marker: "Thou blind fool, Love, what dost thou to mine eyes,"
    end_marker: "And to this false plague are they now transferr’d."
  - poem_title: "Sonnet 138"
    start_marker: "When my love swears that she is made of truth,"
    end_marker: "And in our faults by lies we flatter’d be."
  - poem_title: "Sonnet 139"
    start_marker: "O! call not me to justify the wrong"
    end_marker: "Kill me outright with looks, and rid my pain."
  - poem_title: "Sonnet 140"
    start_marker: "Be wise as thou art cruel; do not press"
    end_marker: "Bear thine eyes straight, though thy proud heart go wide."
  - poem_title: "Sonnet 141"
    start_marker: "In faith I do not love thee with mine eyes,"
    end_marker: "That she that makes me sin awards me pain."
  - poem_title: "Sonnet 142"
    start_marker: "Love is my sin, and thy dear virtue hate,"
    end_marker: "By self-example mayst thou be denied!"
  - poem_title: "Sonnet 143"
    start_marker: "Lo, as a careful housewife runs to catch"
    end_marker: "If thou turn back and my loud crying still."
  - poem_title: "Sonnet 144"
    start_marker: "Two loves I have of comfort and despair,"
    end_marker: "Till my bad angel fire my good one out."
  - poem_title: "Sonnet 145"
    start_marker: "Those lips that Love’s own hand did make,"
    end_marker: "And sav’d my life, saying ‘not you’."
  - poem_title: "Sonnet 146"
    start_marker: "Poor soul, the centre of my sinful earth,"
    end_marker: "And Death once dead, there’s no more dying then."
  - poem_title: "Sonnet 147"
    start_marker: "My love is as a fever longing still,"
    end_marker: "Who art as black as hell, as dark as night."
  - poem_title: "Sonnet 148"
    start_marker: "O me! what eyes hath Love put in my head,"
    end_marker: "Lest eyes well-seeing thy foul faults should find."
  - poem_title: "Sonnet 149"
    start_marker: "Canst thou, O cruel! say I love thee not,"
    end_marker: "Those that can see thou lov’st, and I am blind."
  - poem_title: "Sonnet 150"
    start_marker: "O! from what power hast thou this powerful might,"
    end_marker: "More worthy I to be belov’d of thee."
  - poem_title: "Sonnet 151"
    start_marker: "Love is too young to know what conscience is,"
    end_marker: "Her ‘love,’ for whose dear love I rise and fall."
  - poem_title: "Sonnet 152"
    start_marker: "In loving thee thou know’st I am forsworn,"
    end_marker: "To swear against the truth so foul a lie."
  - poem_title: "Sonnet 153"
    start_marker: "Cupid laid by his brand and fell asleep:"
    end_marker: "Where Cupid got new fire; my mistress’ eyes."
  - poem_title: "Sonnet 154"
    start_marker: "The little Love-god lying once asleep,"
    end_marker: "Love’s fire heats water, water cools not love."
