collection_title: "Shakespeare Sonnets Selection"
gutenberg_id: 1041
poems:
  - poem_title: "Sonnet 1"
    start_marker: "From fairest creatures we desire increase,"
    end_marker: "To eat the world\u2019s due, by the grave and thee."
  - poem_title: "Sonnet 18"
    start_marker: "Shall I compare thee to a summer's day?"
    end_marker: "So long lives this, and this gives life to thee."
