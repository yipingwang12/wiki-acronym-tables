<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2d5016">
<title>Quiz</title>
<link rel="manifest" href="/pwa/manifest.json">
<link rel="apple-touch-icon" href="/pwa/icon-192.png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1a1a2e; --surface: #16213e; --card: #0f3460;
  --green: #2d5016; --green-light: #4a8025; --green-bright: #7bc142;
  --text: #e8f4f8; --muted: #8899a6; --danger: #e74c3c;
  --radius: 12px; --gap: 12px;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
body { display: flex; flex-direction: column; max-width: 600px; margin: 0 auto; padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom); }

header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 8px; border-bottom: 1px solid #ffffff18; }
header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
.sync-btn { background: var(--green); border: none; color: var(--text); padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; }
.sync-btn:active { background: var(--green-light); }

#status { font-size: 0.8rem; color: var(--muted); padding: 6px 0; min-height: 24px; }
#status.ok { color: var(--green-bright); }
#status.err { color: var(--danger); }

main { flex: 1; overflow-y: auto; padding: 8px 0; }

.group-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0 4px; cursor: pointer; user-select: none;
}
.group-header h2 { font-size: 0.95rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.group-header .chevron { color: var(--muted); transition: transform 0.2s; }
.group-header.collapsed .chevron { transform: rotate(-90deg); }
.group-body.collapsed { display: none; }

.deck-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 8px;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.15s;
}
.deck-card:active { background: var(--card); }
.deck-info { flex: 1; min-width: 0; }
.deck-name { font-size: 1rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.deck-meta { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
.study-btn {
  background: var(--green); color: var(--text); border: none;
  padding: 8px 18px; border-radius: 20px; font-size: 0.9rem;
  cursor: pointer; margin-left: 12px; flex-shrink: 0; font-weight: 600;
}
.study-btn:active { background: var(--green-light); }

.offline-banner {
  background: #4a2200; border-radius: var(--radius); padding: 10px 14px;
  font-size: 0.85rem; margin-bottom: 8px; display: none;
}
.offline-banner.show { display: block; }

#loading { text-align: center; padding: 40px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>📚 Quiz</h1>
  <button class="sync-btn" id="syncBtn">Sync</button>
</header>
<div id="status"></div>
<div class="offline-banner" id="offlineBanner">Offline — showing cached decks. SRS state saved locally and will sync on reconnect.</div>
<main id="deckList"><div id="loading">Loading decks…</div></main>

<script type="module">
import { syncWithServer } from './sync.js';
import { saveDeckListCache, getDeckListCache } from './db.js';

// sync-bundle.js re-exports sync.js + db.js deck list helpers together
// (they're bundled to avoid dynamic import issues in service worker context)

const statusEl = document.getElementById('status');
const offlineBanner = document.getElementById('offlineBanner');
const deckList = document.getElementById('deckList');

function setStatus(msg, type = '') {
  statusEl.textContent = msg;
  statusEl.className = type;
  if (msg) setTimeout(() => { if (statusEl.textContent === msg) statusEl.textContent = ''; }, 4000);
}

function relativeTime(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

function renderDecks(decks) {
  deckList.innerHTML = '';
  if (!decks.length) {
    deckList.innerHTML = '<div id="loading">No decks found. Is the server running?</div>';
    return;
  }

  // Group by collection, ungrouped last
  const groups = new Map();
  for (const d of decks) {
    const g = d.group || '\x00';
    if (!groups.has(g)) groups.set(g, []);
    groups.get(g).push(d);
  }

  for (const [group, members] of groups) {
    if (group !== '\x00') {
      const hdr = document.createElement('div');
      hdr.className = 'group-header';
      hdr.innerHTML = `<h2>${group}</h2><span class="chevron">▾</span>`;
      const body = document.createElement('div');
      body.className = 'group-body';
      hdr.addEventListener('click', () => {
        hdr.classList.toggle('collapsed');
        body.classList.toggle('collapsed');
      });
      deckList.appendChild(hdr);
      deckList.appendChild(body);
      members.forEach(d => body.appendChild(makeDeckCard(d)));
    } else {
      members.forEach(d => deckList.appendChild(makeDeckCard(d)));
    }
  }
}

function makeDeckCard(deck) {
  const card = document.createElement('div');
  card.className = 'deck-card';
  const last = deck.last_studied ? `Last studied ${relativeTime(deck.last_studied)}` : 'Not studied yet';
  card.innerHTML = `
    <div class="deck-info">
      <div class="deck-name">${deck.name}</div>
      <div class="deck-meta">${deck.mode === 'digits' ? 'Digits' : 'Words'} · ${last}</div>
    </div>
    <button class="study-btn">Study</button>
  `;
  card.querySelector('.study-btn').addEventListener('click', () => {
    location.href = `quiz.html?deck_id=${encodeURIComponent(deck.id)}&deck_name=${encodeURIComponent(deck.name)}&mode=${deck.mode}`;
  });
  return card;
}

async function loadDecks() {
  deckList.innerHTML = '<div id="loading">Loading decks…</div>';
  try {
    const resp = await fetch('/api/decks');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const decks = await resp.json();
    await saveDeckListCache(decks);
    offlineBanner.classList.remove('show');
    renderDecks(decks);
  } catch {
    const cached = await getDeckListCache();
    if (cached) {
      offlineBanner.classList.add('show');
      renderDecks(cached);
    } else {
      deckList.innerHTML = '<div id="loading" style="color:#e74c3c">Server unreachable and no cached data.</div>';
    }
  }
}

document.getElementById('syncBtn').addEventListener('click', async () => {
  setStatus('Syncing…');
  const result = await syncWithServer('');
  if (result.synced) {
    setStatus(`Synced (${result.count} cards)`, 'ok');
    await loadDecks();
  } else {
    setStatus(`Sync failed: ${result.reason}`, 'err');
  }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/pwa/sw.js', { scope: '/pwa/' }).catch(() => {});
}

loadDecks();
</script>
</body>
</html>
