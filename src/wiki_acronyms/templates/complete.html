<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title }} — Complete</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { background: white; padding: 48px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; max-width: 400px; width: 100%; }
    h1 { color: #2e7d32; margin-bottom: 12px; }
    p { color: #888; margin-bottom: 32px; }
    a { display: inline-block; padding: 12px 28px; background: #4caf50; color: white; text-decoration: none; border-radius: 6px; font-size: 1em; }
    a:hover { background: #43a047; }
  </style>
</head>
<body>
<div class="container">
  <h1>Complete!</h1>
  <p>You reviewed all lines of <em>{{ title }}</em>.</p>
  <a href="/">Start again</a>
</div>
</body>
</html>
